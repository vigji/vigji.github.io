baseURL = "https://vigji.github.io/"
languageCode = "en-US"
title = "Luigi Petrucco"
theme = "hugo-tufte"
canonifyurls = false
paginate = 10
disableKinds = ["taxonomy", "term"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    guessSyntax = true

[params]
  subtitle = "Data, cells, brains, and code"
  author = "Luigi Petrucco"
  description = "Personal site of Luigi Petrucco — data scientist, AI engineer, and former neuroscientist. Writing about data, cells, brains, and code."
  defaultImage = "/images/og-default.png"
  codeblocksdark = false
  marginNoteInd = "⊕"
  showPoweredBy = false
  hidedate = false
  showSummary = true
  math = false
  sansSubtitle = false
  centerArticle = false
  KaTeXCDN = "https://cdn.jsdelivr.net/npm"
  KaTeXVersion = "0.16.11"
  github = "vigji"
  mastodon = "mastodon.social/@vigji"
  bluesky = "vigji.bsky.social"
  email = "luigi.petrucco@gmail.com"
  google_scholar = "FQDeRWQAAAAJ"

[taxonomies]

[menu]
  [[menu.nav]]
    name = "home"
    weight = -110
    identifier = "home"
    url = "/"
  [[menu.nav]]
    name = "blog"
    weight = -100
    identifier = "blog"
    url = "/blog/"
  [[menu.nav]]
    name = "about"
    weight = -90
    identifier = "about"
    url = "/about/"

[outputs]
  home = ["HTML", "RSS", "LLMS", "LLMSFull"]
  section = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"
  [outputFormats.LLMS]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true
  [outputFormats.LLMSFull]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    notAlternative = true
