{{ define "main" }}
<article id="main">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}
  <section>{{ . }}</section>
  {{ end }}

  <section>
    <ul class="blog-list">
      {{ range .Pages }}
      <li>
        <a class="post-title" href="{{ .RelPermalink }}">{{ .Title }}</a>
        {{ with .Description }}
        <p class="post-summary">{{ . }}</p>
        {{ end }}
        <span class="post-date">{{ .Date.Format "January 2, 2006" }}</span>
      </li>
      {{ end }}
    </ul>
  </section>


</article>
{{ end }}
