{{ define "main" }}
<article id="main">
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p class="post-description">{{ . }}</p>{{ end }}
  <div class="post-meta">
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
    <span class="post-reading-time">{{ .ReadingTime }} min read</span>
  </div>

  <section>
    {{ .Content }}
  </section>

  <div class="post-subscribe">
    <h3>Enjoyed this?</h3>
    <p>Subscribe to get new articles in your inbox.</p>
    {{ partial "aweber-form.html" . }}
  </div>

</article>
{{ end }}
