{{/* Buttondown subscribe form — only show on blog pages */}}
{{ if eq .Section "blog" }}
<div class="subscribe-form">
  <p>Subscribe for new posts</p>
  <form
    action="https://buttondown.com/api/emails/newsletter-subscribe"
    method="post"
    target="popupwindow"
  >
    {{/* Replace YOURNAME with your Buttondown username after creating an account at https://buttondown.com */}}
    <input type="hidden" name="tag" value="YOURNAME" />
    <input type="email" name="email" placeholder="your@email.com" required />
    <input type="submit" value="Subscribe" />
  </form>
</div>
{{ end }}
