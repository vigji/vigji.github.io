    <path d="M600,280 Q625,298 655,296 Q685,292 715,302 Q745,312 775,308 Q800,302 815,298" stroke-width="0.4" opacity="0.18"/>
    <path d="M590,320 Q612,338 640,336 Q668,332 698,342 Q728,352 758,348 Q788,342 815,338" stroke-width="0.4" opacity="0.15"/>
    <!-- Ball -->
    <circle cx="700" cy="16" r="4" fill="#8a8078" stroke="none" opacity="0.5"/>
