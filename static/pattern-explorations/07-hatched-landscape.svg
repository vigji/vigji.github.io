    <line x1="765" y1="205" x2="755" y2="220" stroke-width="0.3" opacity="0.25"/>
    <line x1="770" y1="215" x2="760" y2="230" stroke-width="0.3" opacity="0.25"/>
    <line x1="775" y1="225" x2="765" y2="240" stroke-width="0.3" opacity="0.25"/>
    <line x1="780" y1="235" x2="770" y2="250" stroke-width="0.3" opacity="0.22"/>
    <line x1="785" y1="248" x2="775" y2="263" stroke-width="0.3" opacity="0.22"/>
    <line x1="790" y1="260" x2="780" y2="275" stroke-width="0.3" opacity="0.2"/>
    <line x1="795" y1="275" x2="785" y2="290" stroke-width="0.3" opacity="0.2"/>
