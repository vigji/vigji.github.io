    <line x1="620" y1="245" x2="630" y2="260" stroke-width="0.3" opacity="0.22"/>
    <line x1="615" y1="255" x2="625" y2="270" stroke-width="0.3" opacity="0.2"/>
    <line x1="610" y1="265" x2="620" y2="280" stroke-width="0.3" opacity="0.2"/>
